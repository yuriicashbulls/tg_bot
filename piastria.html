<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎮 Piastria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: var(--app-height, 100dvh);
            overflow: hidden;
            background: #000;
            overscroll-behavior: none;
        }
        body {
            padding-top: var(--inset-top, 0px);
            padding-bottom: var(--inset-bottom, 0px);
            padding-left: var(--inset-left, 0px);
            padding-right: var(--inset-right, 0px);
        }
        #game-frame {
            width: 100%;
            height: 100%; 
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="game-frame" src="https://pg-l8pf.onrender.com/" allowfullscreen></iframe>
    <script>
        const tg = window.Telegram.WebApp;

        tg.ready();
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        if (tg.setHeaderColor) tg.setHeaderColor('#000000');
        if (tg.requestFullscreen) tg.requestFullscreen();

        function readInset(inset) {
            return {
                top: inset?.top ?? 0,
                bottom: inset?.bottom ?? 0,
                left: inset?.left ?? 0,
                right: inset?.right ?? 0,
            };
        }

        function applyViewport() {
            const h = tg.viewportStableHeight || tg.viewportHeight || window.innerHeight;

            const device  = readInset(tg.safeAreaInset);
            const content = readInset(tg.contentSafeAreaInset);

            const top    = device.top    + content.top;
            const bottom = device.bottom + content.bottom;
            const left   = device.left   + content.left;
            const right  = device.right  + content.right;

            const root = document.documentElement.style;
            root.setProperty('--app-height', h + 'px');
            root.setProperty('--inset-top',    top    + 'px');
            root.setProperty('--inset-bottom', bottom + 'px');
            root.setProperty('--inset-left',   left   + 'px');
            root.setProperty('--inset-right',  right  + 'px');
        }

        applyViewport();

        tg.onEvent('viewportChanged', applyViewport);
        tg.onEvent('safeAreaChanged', applyViewport);
        tg.onEvent('contentSafeAreaChanged', applyViewport);
        tg.onEvent('fullscreenChanged', applyViewport);
        window.addEventListener('resize', applyViewport);
    </script>
</body>
</html>
