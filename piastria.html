<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎮 Piastria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: var(--app-height, 100dvh);
            overflow: hidden;
            background: #000;
        }
        body {
            padding-top: var(--top-offset, 15vh);
        }
        #game-frame {
            width: 100%;
            height: var(--frame-height, 85vh);
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="game-frame" src="https://pg-l8pf.onrender.com/" allowfullscreen></iframe>
    <script>
        const tg = window.Telegram.WebApp;
        const TOP_OFFSET_RATIO = 0.15;

        tg.ready();
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        if (tg.requestFullscreen) tg.requestFullscreen();

        function applyViewport() {
            const h = tg.viewportStableHeight || tg.viewportHeight || window.innerHeight;
            const topOffset = Math.round(h * TOP_OFFSET_RATIO);
            document.documentElement.style.setProperty('--app-height', h + 'px');
            document.documentElement.style.setProperty('--top-offset', topOffset + 'px');
            document.documentElement.style.setProperty('--frame-height', (h - topOffset) + 'px');
        }

        applyViewport();
        tg.onEvent('viewportChanged', applyViewport);
        window.addEventListener('resize', applyViewport);
    </script>
</body>
</html>
